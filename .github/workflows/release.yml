name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish screensaver
        shell: pwsh
        run: |
          dotnet publish windows-src/FliqloScr/FliqloScr.csproj -c Release -f net10.0-windows -r win-x64 --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true /p:EnableCompressionInSingleFile=true
          Copy-Item windows-src/FliqloScr/bin/Release/net10.0-windows/win-x64/publish/FliqloScr.exe windows-src/FliqloScr/bin/Release/net10.0-windows/win-x64/publish/FliqloScr-Windows-x64.scr

      - name: Upload windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: FliqloScr-Windows-x64
          path: windows-src/FliqloScr/bin/Release/net10.0-windows/win-x64/publish/FliqloScr-Windows-x64.scr

  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build release APK
        working-directory: android-src
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Rename APK
        run: cp android-src/app/build/outputs/apk/release/app-release.apk android-src/app/build/outputs/apk/release/FliqloReborn-Android.apk

      - name: Upload android artifact
        uses: actions/upload-artifact@v4
        with:
          name: FliqloReborn-Android
          path: android-src/app/build/outputs/apk/release/FliqloReborn-Android.apk

  publish-release:
    needs:
      - build-windows
      - build-android
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/FliqloScr-Windows-x64.scr
            release-assets/FliqloReborn-Android.apk
          generate_release_notes: true
